version: "3.9"

services:
  app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - /tmp:/tmp
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  worker:
    build: .
    command: rq worker codesage --url redis://redis:6379
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - /tmp:/tmp
    restart: unless-stopped
